services:
  postgres:
    image: postgres:16-alpine
    container_name: assbi-postgres
    environment:
      POSTGRES_DB: assbi
      POSTGRES_USER: assbi
      POSTGRES_PASSWORD: assbi123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assbi -d assbi"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
