spring:
  threads:
    virtual:
      enabled: true      # Java 21 virtual threads for Tomcat + scheduling

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/assbi}
    username: ${DB_USER:assbi}
    password: ${DB_PASSWORD:assbi123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  pattern:
    console: "%d{HH:mm:ss} %-5level %logger{25} — %msg%n"
  level:
    root: WARN
    com.assbi: INFO
    org.flywaydb: INFO

assbi:
  root: ${ASSBI_ROOT:..}
  worker:
    log-file: logs/worker.log
  stats:
    push-rate-ms: 1000
    live-window-minutes: 60
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
  data-retention:
    days: ${DATA_RETENTION_DAYS:90}
